version: 2

multi-ecosystem-groups:
  backend:
    schedule:
      interval: "monthly"
  frontend:
    schedule:
      interval: "monthly"
  infra:
    schedule:
      interval: "monthly"

updates:
  - package-ecosystem: "cargo"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "backend"

  - package-ecosystem: "npm"
    directory: "/web"
    patterns:
      - "*"
    ignore:
      - dependency-name: "bootstrap"
        versions: ["5.2.x"]
      - dependency-name: "postcss"
    multi-ecosystem-group: "frontend"

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "infra"

  - package-ecosystem: "docker"
    directory: "/clotributor-apiserver"
    patterns:
      - "*"
    ignore:
      - dependency-name: "node"
        versions: ["19-alpine3.19", "20-alpine3.19", "21-alpine3.19", "22-alpine3.19", "22-alpine3.20", "23-alpine3.21"]
    multi-ecosystem-group: "infra"

  - package-ecosystem: "docker"
    directory: "/clotributor-registrar"
    patterns:
      - "*"
    multi-ecosystem-group: "infra"

  - package-ecosystem: "docker"
    directory: "/clotributor-tracker"
    patterns:
      - "*"
    multi-ecosystem-group: "infra"

  - package-ecosystem: "docker"
    directory: "/database/migrations"
    patterns:
      - "*"
    multi-ecosystem-group: "infra"
